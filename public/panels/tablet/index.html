<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waiter tablet</title>
  <!-- Inline emoji favicon so the browser stops 404-ing on /favicon.ico. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍🍳</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🧑‍🍳 Waiter <span class="sub">live floor</span></div>
    <!-- Live count chips beside the brand (tap to filter) + clock. -->
    <div class="top-actions"><div class="counts" id="counts"></div><span id="clock" class="clock"></span></div>
  </header>

  <main class="layout">
    <!-- LEFT: the live floor — one tile per table, tap to work that table. -->
    <section class="floor">
      <!-- Always-on legend (same language as the editor): INSIDE = fill colour,
           OUTLINE = the bill is paid / unpaid. Never hidden so anyone can read the floor. -->
      <div class="legend" id="legend">
        <div class="leg-grp">
          <span class="leg-key">Inside</span>
          <span class="leg-it"><i class="sw" style="background:#6b6253"></i>Free</span>
          <span class="leg-it"><i class="sw" style="background:#2dd4bf"></i>Seated</span>
          <span class="leg-it"><i class="sw" style="background:#f59e0b"></i>New order</span>
          <span class="leg-it"><i class="sw" style="background:#4f9dff"></i>Preparing</span>
          <span class="leg-it"><i class="sw" style="background:#ec4899"></i>Ready</span>
          <span class="leg-it"><i class="sw" style="background:#22c55e"></i>Served</span>
          <span class="leg-it">🔔 called</span>
        </div>
        <div class="leg-grp">
          <span class="leg-key">Outline</span>
          <span class="leg-it"><i class="sw o" style="border-color:#ef4444"></i>unpaid</span>
          <span class="leg-it"><i class="sw o" style="border-color:#22c55e"></i>paid</span>
        </div>
      </div>
      <div class="floor-nav" id="floorNav"></div>
      <div class="tiles" id="tiles"></div>
    </section>

    <!-- RIGHT: the work panel for the selected table (or the order-taking flow). -->
    <aside class="panel" id="panel">
      <div class="empty">Tap a table to see it — or to take an order for it.</div>
    </aside>
  </main>

  <div id="toasts" class="toasts"></div>
  <!-- The are-you-sure dialog used before sending an order to the kitchen. -->
  <div class="confirm-overlay" id="confirmOverlay" hidden>
    <div class="confirm-box">
      <p id="confirmText"></p>
      <div class="confirm-actions">
        <button class="btn" id="confirmNo">Cancel</button>
        <button class="btn primary" id="confirmYes">Yes, send it</button>
      </div>
    </div>
  </div>
  <script src="/panels/maint.js"></script>
  <script src="app.js"></script>
</body>
</html>
